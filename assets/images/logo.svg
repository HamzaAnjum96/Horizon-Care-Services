<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" role="img" aria-labelledby="title desc">
  <title id="title">Horizon Care Services logo</title>
  <desc id="desc">Two hands shaking in purple with the Horizon Care Services name.</desc>
  <defs>
    <linearGradient id="purpleShift" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B3DAB"/>
      <stop offset="100%" stop-color="#4A1A6B"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="420" height="120" rx="18" fill="#F3E8FB"/>

  <!-- emblem -->
  <g transform="translate(18 16)">
    <circle cx="44" cy="44" r="38" fill="url(#purpleShift)" opacity="0.14"/>
    <path d="M9 47c5-6 12-9 18-9h10l10 9-8 8-8-7h-4c-4 0-7 1-9 4l-4 6L3 53z" fill="#6B2D8B"/>
    <path d="M79 47c-5-6-12-9-18-9H51l-10 9 8 8 8-7h4c4 0 7 1 9 4l4 6 11-5z" fill="#6B2D8B"/>
    <path d="M31 57l8-8 8 7 8-7 8 8-6 7c-2 2-5 2-7 0l-3-3-3 3c-2 2-5 2-7 0z" fill="#8B3DAB"/>
    <path d="M17 66l6-9 8 7-6 9c-2 3-6 4-9 2l-7-4 8-5z" fill="#4A1A6B" opacity="0.9"/>
    <path d="M71 66l-6-9-8 7 6 9c2 3 6 4 9 2l7-4-8-5z" fill="#4A1A6B" opacity="0.9"/>
  </g>

  <!-- wordmark -->
